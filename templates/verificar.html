<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trinity Systems | Verificación</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), 
                        url('https://images.unsplash.com/photo-1611974717482-9825116a8ad0?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        .glass-card {
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input {
            background-color: #0d1117 !important;
            color: #ffffff !important;
            border: 1px solid #30363d !important;
            text-align: center;
            letter-spacing: 0.5em;
            font-size: 1.5rem;
        }
        input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2) !important;
        }
    </style>
</head>
<body>
    <div class="glass-card p-10 rounded-2xl w-full max-w-sm border-t-4 border-yellow-500">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-white italic uppercase tracking-tighter">Verificación</h1>
            <p class="text-gray-400 text-[10px] mt-2 uppercase tracking-widest font-bold">Ingresa el código enviado a tu email</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="mb-4 p-3 bg-yellow-900/30 border border-yellow-700 text-yellow-200 text-xs text-center rounded-xl">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="/validar_codigo" method="POST" class="space-y-5">
            <input type="hidden" name="username" value="{{ username }}">
            
            <div>
                <input type="text" name="codigo" maxlength="6" placeholder="000000" required 
                       class="w-full rounded-xl p-4 outline-none transition-all duration-200 uppercase font-mono">
            </div>

            <button type="submit" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-black py-4 rounded-xl transition-all duration-300 uppercase text-xs tracking-[0.2em] shadow-lg shadow-yellow-900/20">
                Validar Cuenta
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">
                ¿No recibiste el código? <a href="#" class="text-yellow-500 hover:text-yellow-300 transition">Reenviar</a>
            </p>
        </div>
    </div>

    <footer class="mt-12 text-center">
        <p class="text-[8px] text-gray-700 mt-2 uppercase">© 2026 Trinity Systems. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
